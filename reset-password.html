<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Choose a new AI Appointment Scheduler password.">
    <meta name="robots" content="noindex">
    <title>Reset Password | AI Appointment Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    <header class="header container">
        <a class="logo" href="index.html">AI Appointment Scheduler</a>
        <nav class="nav" aria-label="Main navigation"><a href="login.html">Log in</a></nav>
    </header>

    <main id="mainContent" class="auth-main container" tabindex="-1">
        <section class="card auth-card" aria-labelledby="resetHeading">
            <p class="eyebrow">Account recovery</p>
            <h1 id="resetHeading">Choose a new password</h1>
            <p>Enter and confirm the new password for your account.</p>

            <form id="resetPasswordForm" class="form">
                <div class="field">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" autocomplete="new-password" minlength="8" required aria-describedby="resetMessage">
                </div>
                <div class="field">
                    <label for="confirmPassword">Confirm new password</label>
                    <input type="password" id="confirmPassword" autocomplete="new-password" minlength="8" required aria-describedby="resetMessage">
                </div>
                <button type="submit" class="btn btn-primary">Update password</button>
                <p id="resetMessage" class="message" role="status" aria-live="polite" aria-atomic="true" tabindex="-1"></p>
            </form>
        </section>
    </main>

    <footer class="footer container"><p>&copy; 2026 Chassidy Barker. All rights reserved.</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>
</html>
