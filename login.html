<form id="loginForm" class="form">
    <div class="field">
        <label for="fullName">Full Name</label>

        <input
            type="text"
            id="fullName"
            name="fullName"
            autocomplete="name"
            maxlength="100"
            placeholder="Enter your full name"
        >
    </div>

    <div class="field">
        <label for="email">Email Address</label>

        <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
        >
    </div>

    <div class="field">
        <label for="password">Password</label>

        <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            minlength="6"
            placeholder="At least 6 characters"
            required
        >
    </div>

    <div class="button-row">
        <button
            type="button"
            id="signupButton"
            class="btn btn-primary"
        >
            Create Account
        </button>

        <button
            type="submit"
            class="btn btn-secondary"
        >
            Log In
        </button>
    </div>

    <p
        id="authMessage"
        class="message"
        role="status"
        aria-live="polite"
    ></p>
</form>
