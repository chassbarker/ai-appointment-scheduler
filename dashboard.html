<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create and manage your appointments.">
    <title>Dashboard | AI Appointment Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header container">
        <a class="logo" href="index.html">AI Appointment Scheduler</a>
        <nav class="nav" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <button type="button" id="logoutBtn" class="link-button">Log out</button>
        </nav>
    </header>

    <main class="dashboard container">
        <section class="dashboard-heading">
            <p class="eyebrow">Your dashboard</p>
            <h1 id="welcomeMessage">Welcome!</h1>
            <p>Create, update, and delete your upcoming appointments.</p>
        </section>

        <section class="card" aria-labelledby="formHeading">
            <h2 id="formHeading">Schedule an appointment</h2>
            <form id="appointmentForm" class="form appointment-form">
                <input type="hidden" id="appointmentId">
                <div class="field">
                    <label for="name">Appointment name</label>
                    <input id="name" name="name" type="text" maxlength="100" required>
                </div>
                <div class="field">
                    <label for="type">Appointment type</label>
                    <select id="type" name="type" required>
                        <option value="">Select a type</option>
                        <option value="Consultation">Consultation</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Medical">Medical</option>
                        <option value="Dental">Dental</option>
                        <option value="Vision">Vision</option>
                        <option value="Therapy">Therapy</option>
                        <option value="Personal">Personal</option>
                        <option value="Business">Business</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="field">
                    <label for="date">Date</label>
                    <input id="date" name="date" type="date" required>
                </div>
                <div class="field">
                    <label id="timeLabel">Time</label>
                    <input id="time" name="time" type="hidden">
                    <div class="time-selects" role="group" aria-labelledby="timeLabel">
                        <select id="timeHour" aria-label="Hour" required>
                            <option value="">Hour</option>
                            <option value="1">1</option><option value="2">2</option>
                            <option value="3">3</option><option value="4">4</option>
                            <option value="5">5</option><option value="6">6</option>
                            <option value="7">7</option><option value="8">8</option>
                            <option value="9">9</option><option value="10">10</option>
                            <option value="11">11</option><option value="12">12</option>
                        </select>
                        <select id="timeMinute" aria-label="Minute" required>
                            <option value="">Minute</option>
                            <option value="00">00</option><option value="05">05</option>
                            <option value="10">10</option><option value="15">15</option>
                            <option value="20">20</option><option value="25">25</option>
                            <option value="30">30</option><option value="35">35</option>
                            <option value="40">40</option><option value="45">45</option>
                            <option value="50">50</option><option value="55">55</option>
                        </select>
                        <select id="timePeriod" aria-label="AM or PM" required>
                            <option value="">AM/PM</option>
                            <option value="AM">AM</option>
                            <option value="PM">PM</option>
                        </select>
                    </div>
                </div>
                <div class="field field-wide">
                    <label for="notes">Notes <span class="optional">(optional)</span></label>
                    <textarea id="notes" name="notes" rows="3" maxlength="500"></textarea>
                </div>
                <div class="button-row field-wide">
                    <button id="saveAppointmentBtn" type="submit" class="btn btn-primary">Save appointment</button>
                    <button id="cancelEditBtn" type="button" class="btn btn-secondary" hidden>Cancel edit</button>
                </div>
                <p id="appointmentMessage" class="message field-wide" role="status" aria-live="polite"></p>
            </form>
        </section>

        <section class="appointments" aria-labelledby="appointmentsHeading">
            <div class="section-heading">
                <h2 id="appointmentsHeading">Manage appointments</h2>
                <button id="refreshBtn" type="button" class="btn btn-secondary btn-small">Refresh</button>
            </div>
            <div class="appointment-filters" aria-label="Appointment filters">
                <div class="field"><label for="appointmentSearch">Search</label><input id="appointmentSearch" type="search" placeholder="Search name, type, or notes"></div>
                <div class="field"><label for="typeFilter">Filter by type</label><select id="typeFilter"><option value="">All types</option><option>Consultation</option><option>Follow-up</option><option>Medical</option><option>Dental</option><option>Vision</option><option>Therapy</option><option>Personal</option><option>Business</option><option>Other</option></select></div>
            </div>
            <section class="appointment-group" aria-labelledby="upcomingHeading">
                <h3 id="upcomingHeading">Upcoming</h3>
                <div id="upcomingAppointmentsList" class="appointment-list" aria-live="polite"><p>Loading appointments...</p></div>
            </section>
            <section class="appointment-group" aria-labelledby="pastHeading">
                <h3 id="pastHeading">Past and completed</h3>
                <div id="pastAppointmentsList" class="appointment-list" aria-live="polite"></div>
            </section>
        </section>
    </main>

    <footer class="footer container"><p>&copy; 2026 Chassidy Barker. All rights reserved.</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/appointments.js"></script>
</body>
</html>
