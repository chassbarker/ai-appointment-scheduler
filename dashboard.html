<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AI Appointment Scheduler</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <h1 class="logo">Dashboard</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <!-- Main Dashboard -->
    <main>
        <section class="hero">
            <h2 id="welcomeMessage">Welcome!</h2>
            <p>Your upcoming appointments are listed below.</p>
        </section>

        <!-- Appointment List -->
        <section class="appointments">
            <h3>Upcoming Appointments</h3>
            <div id="appointmentsList">
                <!-- Appointments will be injected here by appointments.js -->
            </div>

            <a class="btn-primary" href="#" id="newAppointmentBtn">+ Schedule Appointment</a>
        </section>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/appointments.js"></script>
<script src="js/app.js"></script>

</body>
</html>
